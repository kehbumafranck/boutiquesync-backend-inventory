# ============================================================
# Configuration commune (tous les profils)
# ============================================================
spring:
  application:
    name: boutiquesync-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}   # 👈 dev par défaut si variable absente
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: ${SERVER_PORT:8085}
  error:
    include-message: never
    include-stacktrace: never

boutiquesync:
  security:
    jwt:
      cookie-secure: ${COOKIE_SECURE:false}
      cookie-same-site: ${COOKIE_SAME_SITE:Lax}
      secret: ${JWT_SECRET}
      access-token-expiry: 900
      refresh-token-expiry: 604800
      issuer: boutiquesync-api
    totp:
      issuer: BoutiqueSync
      encryption-key: ${TOTP_KEY}
    rate-limit:
      login-max-attempts: 5
      login-window-minutes: 15
      login-lock-minutes: 30
      otp-max-resend-per-hour: 3
  whatsapp:
    phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
    access-token: ${WHATSAPP_ACCESS_TOKEN:}
    api-url: https://graph.facebook.com/v18.0
  shop:
    name: ${SHOP_NAME:Ma Boutique}
    address: ${SHOP_ADDRESS:}
    phone: ${SHOP_PHONE:}
    email: ${SHOP_EMAIL:}
    vat-number: ${SHOP_VAT_NUMBER:}
    currency: XAF
    default-vat-rate: 19.25
  mail:
    from: ${MAIL_USERNAME:}
    from-name: ${MAIL_FROM_NAME:BoutiqueSync}
  invitation:
    token-expiry-hours: ${INVITATION_EXPIRY_HOURS:24}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
  scheduler:
    weekly-report-cron: "0 0 8 * * MON"
    monthly-report-cron: "0 0 8 1 * *"
    stock-alert-cron: "0 0 */4 * * *"

logging:
  level:
    com.boutiquesync: INFO
    org.springframework.security: WARN
  file:
    name: logs/boutiquesync.log

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

---
# ============================================================
# Profil DEV — MongoDB standalone local, pas de transactions
# ============================================================
spring:
  config:
    activate:
      on-profile: dev
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/boutiquesync} 
      auto-index-creation: true

logging:
  level:
    com.boutiquesync: DEBUG      # plus verbeux en dev
    org.springframework.data.mongodb: DEBUG

---
# ============================================================
# Profil PROD — MongoDB standalone (serveur actuel)
# ============================================================
spring:
  config:
    activate:
      on-profile: prod
  data:
    mongodb:
      uri: ${MONGODB_URI}        # obligatoire en prod, pas de fallback
      auto-index-creation: true  # actif car MongoDB standalone (pas replica set)

logging:
  level:
    com.boutiquesync: INFO
    org.springframework.security: WARN